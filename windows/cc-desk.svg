<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2D"/>
      <stop offset="100%" style="stop-color:#2A2A3D"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C88CFF"/>
      <stop offset="100%" style="stop-color:#A05EFF"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64C8FF"/>
      <stop offset="100%" style="stop-color:#3DA5E8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="27" y="27" width="202" height="202" rx="30" fill="url(#bg)"/>
  <!-- Purple circle (top-left) -->
  <circle cx="85" cy="85" r="80" fill="url(#c1)" opacity="0.99"/>
  <!-- Cyan circle (bottom-right) -->
  <circle cx="171" cy="171" r="80" fill="url(#c2)" opacity="0.99"/>
  <!-- Terminal prompt (center) -->
  <text x="128" y="148" font-family="Consolas, monospace" font-size="90" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.9)" letter-spacing="-2">&gt;_</text>
  <!-- CC text (bottom-right) -->
  <text x="218" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="end" fill="rgba(255,255,255,0.6)" letter-spacing="0">CC</text>
</svg>
